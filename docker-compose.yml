services:
  postgres:
    image: postgres:16-alpine
    container_name: nuvix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nuvix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nuvix}
      POSTGRES_DB: ${POSTGRES_DB:-nuvix}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:

